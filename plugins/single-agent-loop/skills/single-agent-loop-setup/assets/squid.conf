# squid.conf — egress allowlist フォワードプロキシ（single-agent-loop 隔離用）
#
# 宛先ドメインの allowlist だけ通す。HTTPS は CONNECT の宛先ホスト名で判定するため
# 復号(MITM)は不要 = 証明書注入なし。
# allowlist は allowlist.yaml を編集する（起動時に yq で /gen/allowlist.conf へ変換される）。

http_port 3128

# allowlist（先頭ドットはサブドメイン全体。例: .anthropic.com）
acl allowed_domains dstdomain "/gen/allowlist.conf"

acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

# 許可ドメインであってもポートは 80/443 のみ（任意ポートへの到達を塞ぐ）
http_access deny !Safe_ports
# HTTPS の CONNECT は 443 のみ。それ以外のポートへの CONNECT は拒否
http_access deny CONNECT !SSL_ports

# allowlist に一致する宛先だけ許可、他は全拒否（fail-closed）
http_access allow allowed_domains
http_access deny all

# フォワードプロキシ用途: キャッシュ無効。
# ログは /var/log/squid/access.log（squid は proxy ユーザーへ権限を落とすため /dev/stdout には
# 書けない）。拒否された宛先の確認:
#   docker compose -f loop/docker-compose.yml exec egress-proxy tail -20 /var/log/squid/access.log
# （TCP_DENIED の行が allowlist 外アクセス）
cache deny all
access_log stdio:/var/log/squid/access.log squid
